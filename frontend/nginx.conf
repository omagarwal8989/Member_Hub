server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Without this, refreshing the browser on a client-side route like
    # /members/123 or /reports would 404, since Nginx would look for an
    # actual file at that path instead of letting React Router handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}